spring:
  application:
    name: device-monitoring

  # PostgreSQL database
  datasource:
    url: jdbc:postgresql://localhost:5432/monitoring_db
    username: postgres
    password: ${DB_PASSWORD}

# JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Picture maximum file sizes
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # milliseconds (1000 * 60 * 60) 1 hour
  refresh-expiration: 604800000 # milliseconds (1000 * 60 * 60 * 24 * 7) 7 days

# Error messages
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# Picture storage configuration
app:
  pictures:
    upload-dir: uploads/pictures
    default-filename: default.png