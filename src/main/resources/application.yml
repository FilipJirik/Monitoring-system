#      - http://localhost:5173
#      - http://localhost:3000
#    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
#    allowed-headers: "*"
#    allow-credentials: true

# Error messages
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false