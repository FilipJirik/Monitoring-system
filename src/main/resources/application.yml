spring:
  application:
    name: device-monitoring

  # PostgreSQL database
  datasource:
    url: jdbc:postgresql://localhost:5432/monitoring_db
    username: postgres
    password: ${DB_PASSWORD}

# JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # milliseconds (1000 * 60 * 60) 1 hour

# CORS konfigurace
