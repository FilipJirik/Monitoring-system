services:
  postgres:
    image: postgres:16-alpine
    container_name: monitoring_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: monitoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring-net

  backend:
    build:
      context: .
    container_name: monitoring_backend
    restart: always
    ports:
      - "8080:8080"
      - "8000:8000"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - APP_ADMIN_EMAIL=${APP_ADMIN_EMAIL}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/monitoring_db
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
    networks:
      - monitoring-net

  frontend:
    build:
      context: ./frontend
    container_name: monitoring_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - monitoring-net

volumes:
  postgres_data:

networks:
  monitoring-net:
    driver: bridge